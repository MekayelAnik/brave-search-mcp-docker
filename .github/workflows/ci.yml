name: CI

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          format: tty
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2034

  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false,
              "MD024": false
            }

  yaml-lint:
    name: YAML Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
                level: warning
              truthy:
                level: warning
              document-start: disable

  shell-syntax:
    name: Shell Script Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check shell script syntax
        run: |
          echo "Checking shell script syntax..."
          find . -name "*.sh" -type f | while read -r script; do
            echo "Checking: $script"
            bash -n "$script" || exit 1
          done
          echo "All shell scripts have valid syntax!"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  dockerfile-lint:
    name: Dockerfile Best Practices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Dockerfile for linting
        run: |
          # Create mock build_data for Dockerfile generation
          mkdir -p build_data
          echo "node:22-alpine" > build_data/base-image
          echo "1.0.0" > build_data/version
          echo "supergateway" > build_data/supergateway_repo
          echo "latest" > build_data/supergateway_version

          # Run the modifier script to generate Dockerfile
          chmod +x DockerfileModifier.sh
          ./DockerfileModifier.sh

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.brave-search-mcp
          failure-threshold: warning
          ignore: DL3018,DL3013,DL3059

      - name: Cleanup generated files
        if: always()
        run: |
          rm -rf build_data
          rm -f Dockerfile.brave-search-mcp

  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [shellcheck, markdown-lint, yaml-lint, shell-syntax, security-scan, dockerfile-lint]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          if [[ "${{ needs.shellcheck.result }}" == "failure" ]] || \
             [[ "${{ needs.shell-syntax.result }}" == "failure" ]]; then
            echo "Critical checks failed!"
            exit 1
          fi
          echo "All critical checks passed!"
