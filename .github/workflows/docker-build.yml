name: Docker Build & Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_profile:
        description: 'Build profile (only affects defaults if compression not set)'
        required: false
        default: 'production'
        type: choice
        options:
          - development
          - production
          - ci
      compression_type:
        description: 'Compression algorithm'
        required: false
        default: 'zstd'
        type: choice
        options:
          - zstd
          - gzip
      compression_level:
        description: 'Compression level (default: zstd=22, gzip=9). Leave empty for default.'
        required: false
        type: string
      version:
        description: 'Version to build (e.g., 2.0.61). Leave empty to use default.'
        required: false
        type: string
      publish_latest:
        description: 'Publish as latest tag'
        required: false
        type: string
        default: 'false'
      publish_stable:
        description: 'Publish as stable tag'
        required: false
        type: string
        default: 'false'
      publish_beta:
        description: 'Publish as beta tag'
        required: false
        type: string
        default: 'false'
      skip_dockerhub:
        description: 'Skip Docker Hub publishing'
        required: false
        type: boolean
        default: false
      skip_ghcr:
        description: 'Skip GitHub Container Registry publishing'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
      build_profile:
        description: 'Build profile (only affects defaults if compression not set)'
        required: false
        type: string
        default: 'production'
      compression_type:
        description: 'Compression algorithm (zstd or gzip)'
        required: false
        type: string
        default: 'zstd'
      compression_level:
        description: 'Compression level (default: zstd=22, gzip=9)'
        required: false
        type: string
      publish_latest:
        description: 'Publish as latest tag'
        required: false
        type: string
        default: 'false'
      publish_stable:
        description: 'Publish as stable tag'
        required: false
        type: string
        default: 'false'
      publish_beta:
        description: 'Publish as beta tag'
        required: false
        type: string
        default: 'false'
      skip_dockerhub:
        description: 'Skip Docker Hub publishing'
        required: false
        type: boolean
        default: false
      skip_ghcr:
        description: 'Skip GitHub Container Registry publishing'
        required: false
        type: boolean
        default: false

env:
  REPO_NAME: brave-search-mcp
  # Docker Hub
  DOCKERHUB_IMAGE: mekayelanik/brave-search-mcp
  # GitHub Container Registry
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/brave-search-mcp
  NPM_PACKAGE: '@brave/brave-search-mcp-server'
  # Build configuration
  BASE_IMAGE: node:alpine
  SUPERGATEWAY_REPO: supergateway
  SUPERGATEWAY_VERSION: latest

jobs:
  # Determine what version to build
  prepare:
    name: Prepare Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_new_version: ${{ steps.version.outputs.is_new_version }}
      publish_latest: ${{ steps.version.outputs.publish_latest }}
      publish_stable: ${{ steps.version.outputs.publish_stable }}
      publish_beta: ${{ steps.version.outputs.publish_beta }}
      skip_dockerhub: ${{ steps.version.outputs.skip_dockerhub }}
      skip_ghcr: ${{ steps.version.outputs.skip_ghcr }}
    steps:
      - name: Determine version to build
        id: version
        run: |
          # Check for version input (from workflow_dispatch or workflow_call)
          INPUT_VERSION="${{ inputs.version || github.event.inputs.version }}"
          PUBLISH_LATEST="${{ inputs.publish_latest || github.event.inputs.publish_latest || 'false' }}"
          PUBLISH_STABLE="${{ inputs.publish_stable || github.event.inputs.publish_stable || 'false' }}"
          PUBLISH_BETA="${{ inputs.publish_beta || github.event.inputs.publish_beta || 'false' }}"
          SKIP_DOCKERHUB="${{ inputs.skip_dockerhub || github.event.inputs.skip_dockerhub || 'false' }}"
          SKIP_GHCR="${{ inputs.skip_ghcr || github.event.inputs.skip_ghcr || 'false' }}"

          if [[ -n "$INPUT_VERSION" ]]; then
            # Use the provided version
            VERSION="$INPUT_VERSION"
            IS_NEW_VERSION="true"
            echo "Using provided version: $VERSION"
          else
            # Fetch latest version from npm registry
            echo "Fetching latest version from npm..."
            VERSION=$(curl -s "https://registry.npmjs.org/${{ env.NPM_PACKAGE }}" | jq -r '.["dist-tags"].latest')

            if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
              echo "Error: Could not fetch latest version from npm"
              exit 1
            fi

            IS_NEW_VERSION="false"
            echo "Using latest npm version: $VERSION"

            # For scheduled/push builds, auto-publish as latest and stable
            if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ github.event_name }}" == "push" ]]; then
              PUBLISH_LATEST="true"
              PUBLISH_STABLE="true"
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_new_version=$IS_NEW_VERSION" >> $GITHUB_OUTPUT
          echo "publish_latest=$PUBLISH_LATEST" >> $GITHUB_OUTPUT
          echo "publish_stable=$PUBLISH_STABLE" >> $GITHUB_OUTPUT
          echo "publish_beta=$PUBLISH_BETA" >> $GITHUB_OUTPUT
          echo "skip_dockerhub=$SKIP_DOCKERHUB" >> $GITHUB_OUTPUT
          echo "skip_ghcr=$SKIP_GHCR" >> $GITHUB_OUTPUT

          echo "## Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish Latest | $PUBLISH_LATEST |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish Stable | $PUBLISH_STABLE |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish Beta | $PUBLISH_BETA |" >> $GITHUB_STEP_SUMMARY
          echo "| Skip Docker Hub | $SKIP_DOCKERHUB |" >> $GITHUB_STEP_SUMMARY
          echo "| Skip GHCR | $SKIP_GHCR |" >> $GITHUB_STEP_SUMMARY

  lint:
    name: Pre-build Validation
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: error

      - name: Validate shell script syntax
        run: |
          for script in DockerfileModifier.sh resources/*.sh; do
            if [[ -f "$script" ]]; then
              echo "Checking: $script"
              bash -n "$script"
            fi
          done

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [prepare, lint]
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && needs.prepare.outputs.skip_dockerhub != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && needs.prepare.outputs.skip_ghcr != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build profile
        id: profile
        run: |
          PROFILE="${{ inputs.build_profile || github.event.inputs.build_profile || 'production' }}"
          INPUT_COMPRESSION_TYPE="${{ inputs.compression_type || github.event.inputs.compression_type }}"
          INPUT_COMPRESSION_LEVEL="${{ inputs.compression_level || github.event.inputs.compression_level }}"

          # Determine compression type (default: zstd)
          if [[ -n "$INPUT_COMPRESSION_TYPE" ]]; then
            COMPRESSION_TYPE="$INPUT_COMPRESSION_TYPE"
          else
            COMPRESSION_TYPE="zstd"
          fi

          # Get default compression level for the type
          if [[ "$COMPRESSION_TYPE" == "gzip" ]]; then
            DEFAULT_LEVEL="9"
          else
            DEFAULT_LEVEL="22"
          fi

          # Validate compression level is an integer, otherwise use default
          if [[ -n "$INPUT_COMPRESSION_LEVEL" ]] && [[ "$INPUT_COMPRESSION_LEVEL" =~ ^[0-9]+$ ]]; then
            COMPRESSION_LEVEL="$INPUT_COMPRESSION_LEVEL"
          else
            if [[ -n "$INPUT_COMPRESSION_LEVEL" ]]; then
              echo "Warning: Invalid compression level '$INPUT_COMPRESSION_LEVEL' (not an integer). Using default: $DEFAULT_LEVEL"
            fi
            COMPRESSION_LEVEL="$DEFAULT_LEVEL"
          fi

          echo "compression_type=$COMPRESSION_TYPE" >> $GITHUB_OUTPUT
          echo "compression_level=$COMPRESSION_LEVEL" >> $GITHUB_OUTPUT
          echo "profile=$PROFILE" >> $GITHUB_OUTPUT

          echo "Compression: $COMPRESSION_TYPE (level $COMPRESSION_LEVEL)"

      - name: Prepare build data
        run: |
          mkdir -p build_data
          echo "${{ env.BASE_IMAGE }}" > build_data/base-image
          echo "${{ needs.prepare.outputs.version }}" > build_data/version
          echo "${{ env.SUPERGATEWAY_REPO }}" > build_data/supergateway_repo
          echo "${{ env.SUPERGATEWAY_VERSION }}" > build_data/supergateway_version
          touch build_data/npm_dependencies

      - name: Generate Dockerfile
        run: |
          chmod +x DockerfileModifier.sh
          ./DockerfileModifier.sh

      - name: Generate build timestamp
        run: |
          TZ='UTC' date +"This Image Was Built At: %Y-%m-%d %H:%M:%S %Z" > resources/build-timestamp.txt

      - name: Determine tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PUBLISH_LATEST="${{ needs.prepare.outputs.publish_latest }}"
          PUBLISH_STABLE="${{ needs.prepare.outputs.publish_stable }}"
          PUBLISH_BETA="${{ needs.prepare.outputs.publish_beta }}"
          SKIP_DOCKERHUB="${{ needs.prepare.outputs.skip_dockerhub }}"
          SKIP_GHCR="${{ needs.prepare.outputs.skip_ghcr }}"
          DATE_TAG=$(date "+%d%m%Y%H%M")

          # Check if both registries are skipped
          if [[ "$SKIP_DOCKERHUB" == "true" && "$SKIP_GHCR" == "true" ]]; then
            echo "Error: Cannot skip both Docker Hub and GHCR publishing"
            exit 1
          fi

          TAGS=""

          # Docker Hub tags (if not skipped)
          if [[ "$SKIP_DOCKERHUB" != "true" ]]; then
            DOCKERHUB_TAGS="${{ env.DOCKERHUB_IMAGE }}:${VERSION}"
            DOCKERHUB_TAGS="${DOCKERHUB_TAGS},${{ env.DOCKERHUB_IMAGE }}:${VERSION}-${DATE_TAG}"

            # Add latest tag if requested
            if [[ "$PUBLISH_LATEST" == "true" && "${{ github.event_name }}" != "pull_request" ]]; then
              DOCKERHUB_TAGS="${DOCKERHUB_TAGS},${{ env.DOCKERHUB_IMAGE }}:latest"
            fi

            # Add stable tag if requested
            if [[ "$PUBLISH_STABLE" == "true" && "${{ github.event_name }}" != "pull_request" ]]; then
              DOCKERHUB_TAGS="${DOCKERHUB_TAGS},${{ env.DOCKERHUB_IMAGE }}:stable"
            fi

            # Add beta tag if requested
            if [[ "$PUBLISH_BETA" == "true" && "${{ github.event_name }}" != "pull_request" ]]; then
              DOCKERHUB_TAGS="${DOCKERHUB_TAGS},${{ env.DOCKERHUB_IMAGE }}:beta"
            fi

            TAGS="${DOCKERHUB_TAGS}"
          fi

          # GHCR tags (if not skipped)
          if [[ "$SKIP_GHCR" != "true" ]]; then
            GHCR_TAGS="${{ env.GHCR_IMAGE }}:${VERSION}"
            GHCR_TAGS="${GHCR_TAGS},${{ env.GHCR_IMAGE }}:${VERSION}-${DATE_TAG}"

            # Add latest tag if requested
            if [[ "$PUBLISH_LATEST" == "true" && "${{ github.event_name }}" != "pull_request" ]]; then
              GHCR_TAGS="${GHCR_TAGS},${{ env.GHCR_IMAGE }}:latest"
            fi

            # Add stable tag if requested
            if [[ "$PUBLISH_STABLE" == "true" && "${{ github.event_name }}" != "pull_request" ]]; then
              GHCR_TAGS="${GHCR_TAGS},${{ env.GHCR_IMAGE }}:stable"
            fi

            # Add beta tag if requested
            if [[ "$PUBLISH_BETA" == "true" && "${{ github.event_name }}" != "pull_request" ]]; then
              GHCR_TAGS="${GHCR_TAGS},${{ env.GHCR_IMAGE }}:beta"
            fi

            if [[ -n "$TAGS" ]]; then
              TAGS="${TAGS},${GHCR_TAGS}"
            else
              TAGS="${GHCR_TAGS}"
            fi
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "skip_dockerhub=$SKIP_DOCKERHUB" >> $GITHUB_OUTPUT
          echo "skip_ghcr=$SKIP_GHCR" >> $GITHUB_OUTPUT
          echo "Tags to build: $TAGS"

      - name: Determine cache registry
        id: cache
        run: |
          SKIP_DOCKERHUB="${{ needs.prepare.outputs.skip_dockerhub }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          # Use GHCR for cache if Docker Hub is skipped, otherwise use Docker Hub
          if [[ "$SKIP_DOCKERHUB" == "true" ]]; then
            CACHE_REGISTRY="${{ env.GHCR_IMAGE }}"
          else
            CACHE_REGISTRY="${{ env.DOCKERHUB_IMAGE }}"
          fi

          echo "registry=$CACHE_REGISTRY" >> $GITHUB_OUTPUT
          echo "Using cache registry: $CACHE_REGISTRY"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ env.REPO_NAME }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          pull: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: |
            type=registry,ref=${{ steps.cache.outputs.registry }}:buildcache-${{ needs.prepare.outputs.version }}
            type=registry,ref=${{ steps.cache.outputs.registry }}:buildcache-latest
            type=gha,scope=${{ github.ref_name }}-build
          cache-to: |
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}:buildcache-{1},mode=max', steps.cache.outputs.registry, needs.prepare.outputs.version) || '' }}
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}:buildcache-latest,mode=max', steps.cache.outputs.registry) || '' }}
            type=gha,scope=${{ github.ref_name }}-build,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          outputs: type=image,oci-mediatypes=true,compression=${{ steps.profile.outputs.compression_type }},compression-level=${{ steps.profile.outputs.compression_level }},force-compression=true,push=${{ github.event_name != 'pull_request' }},export-cache-concurrency=4,export-layers-concurrency=4
          provenance: false
          sbom: false

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && needs.prepare.outputs.is_new_version == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body: |
            ## Brave Search MCP Server v${{ needs.prepare.outputs.version }}

            Automated build from NPM package `${{ env.NPM_PACKAGE }}@${{ needs.prepare.outputs.version }}`

            ### Docker Images

            **Docker Hub:**
            ```bash
            docker pull ${{ env.DOCKERHUB_IMAGE }}:${{ needs.prepare.outputs.version }}
            ```

            **GitHub Container Registry:**
            ```bash
            docker pull ${{ env.GHCR_IMAGE }}:${{ needs.prepare.outputs.version }}
            ```

            ### Quick Start

            ```bash
            docker run -d \
              --name=brave-search-mcp \
              -p 8040:8040 \
              -e BRAVE_API_KEY=your-api-key-here \
              ${{ env.DOCKERHUB_IMAGE }}:${{ needs.prepare.outputs.version }}
            ```

            ### Supported Architectures

            - `linux/amd64` (Intel/AMD 64-bit)
            - `linux/arm64` (ARM 64-bit / Apple Silicon)
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, 'beta') || contains(needs.prepare.outputs.version, 'rc') || contains(needs.prepare.outputs.version, 'alpha') }}
          generate_release_notes: true

      - name: Cleanup build artifacts
        if: always()
        run: |
          rm -rf build_data
          rm -f Dockerfile.${{ env.REPO_NAME }}

      - name: Build Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Settings" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Profile | ${{ steps.profile.outputs.profile }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compression | ${{ steps.profile.outputs.compression_type }} (level ${{ steps.profile.outputs.compression_level }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | linux/amd64, linux/arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache Registry | ${{ steps.cache.outputs.registry }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Hub:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKERHUB_IMAGE }}:${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub Container Registry:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_IMAGE }}:${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### All Tags Published" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: github.event_name != 'pull_request' && needs.prepare.outputs.skip_dockerhub != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: '${{ env.DOCKERHUB_IMAGE }}:${{ needs.prepare.outputs.version }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  update-docker-hub-description:
    name: Update Docker Hub Description
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.prepare.outputs.skip_dockerhub != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}
          readme-filepath: ./README.md
          short-description: "Brave Search MCP Server - Multi-Architecture Docker Image"
