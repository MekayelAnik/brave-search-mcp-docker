name: Docker Build & Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - production
          - ci
      version:
        description: 'Version to build (e.g., 2.0.61)'
        required: false
        type: string
      publish_latest:
        description: 'Publish as latest tag'
        required: false
        type: boolean
        default: false
      publish_stable:
        description: 'Publish as stable tag'
        required: false
        type: boolean
        default: false
      publish_beta:
        description: 'Publish as beta tag'
        required: false
        type: boolean
        default: false
  schedule:
    # Build weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'

env:
  REPO_NAME: brave-search-mcp
  REGISTRY: docker.io
  IMAGE_NAME: mekayelanik/brave-search-mcp
  # Build configuration
  BASE_IMAGE: node:alpine
  SUPERGATEWAY_REPO: supergateway
  SUPERGATEWAY_VERSION: latest
  # Default versions (update these when releasing new versions)
  LATEST_VERSION: '2.0.61'
  STABLE_VERSION: '2.0.61'
  BETA_VERSION: '2.0.50-rc-beta'

jobs:
  lint:
    name: Pre-build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: error

      - name: Validate shell script syntax
        run: |
          for script in DockerfileModifier.sh resources/*.sh; do
            if [[ -f "$script" ]]; then
              echo "Checking: $script"
              bash -n "$script"
            fi
          done

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: '2.0.61'
            is_latest: true
            is_stable: true
          # Add more versions here as needed
          # - version: '2.0.56'
          #   is_latest: false
          #   is_stable: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine version to build
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ matrix.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set build profile
        id: profile
        run: |
          PROFILE="${{ github.event.inputs.build_profile || 'production' }}"

          case "$PROFILE" in
            "development"|"dev")
              echo "compression_type=gzip" >> $GITHUB_OUTPUT
              echo "compression_level=1" >> $GITHUB_OUTPUT
              ;;
            "production"|"prod")
              echo "compression_type=zstd" >> $GITHUB_OUTPUT
              echo "compression_level=22" >> $GITHUB_OUTPUT
              ;;
            "ci"|"continuous-integration")
              echo "compression_type=zstd" >> $GITHUB_OUTPUT
              echo "compression_level=2" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "compression_type=zstd" >> $GITHUB_OUTPUT
              echo "compression_level=15" >> $GITHUB_OUTPUT
              ;;
          esac

          echo "profile=$PROFILE" >> $GITHUB_OUTPUT

      - name: Prepare build data
        run: |
          mkdir -p build_data
          echo "${{ env.BASE_IMAGE }}" > build_data/base-image
          echo "${{ steps.version.outputs.version }}" > build_data/version
          echo "${{ env.SUPERGATEWAY_REPO }}" > build_data/supergateway_repo
          echo "${{ env.SUPERGATEWAY_VERSION }}" > build_data/supergateway_version
          touch build_data/npm_dependencies

      - name: Generate Dockerfile
        run: |
          chmod +x DockerfileModifier.sh
          ./DockerfileModifier.sh

      - name: Generate build timestamp
        run: |
          TZ='UTC' date +"This Image Was Built At: %Y-%m-%d %H:%M:%S %Z" > resources/build-timestamp.txt

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version }}-{{date 'DDMMYYYYHHmm'}}
            type=raw,value=latest,enable=${{ matrix.is_latest == true && github.event_name != 'pull_request' }}
            type=raw,value=stable,enable=${{ matrix.is_stable == true && github.event_name != 'pull_request' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ env.REPO_NAME }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ steps.version.outputs.version }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}:buildcache-{1},mode=max', env.IMAGE_NAME, steps.version.outputs.version) || '' }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          provenance: false
          sbom: false

      - name: Cleanup build artifacts
        if: always()
        run: |
          rm -rf build_data
          rm -f Dockerfile.${{ env.REPO_NAME }}

  publish-tags:
    name: Publish Tag Aliases
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && (github.event.inputs.publish_latest == 'true' || github.event.inputs.publish_stable == 'true' || github.event.inputs.publish_beta == 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish latest tag
        if: github.event.inputs.publish_latest == 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${{ env.LATEST_VERSION }}

      - name: Publish stable tag
        if: github.event.inputs.publish_stable == 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:stable \
            ${{ env.IMAGE_NAME }}:${{ env.STABLE_VERSION }}

      - name: Publish beta tag
        if: github.event.inputs.publish_beta == 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:beta \
            ${{ env.IMAGE_NAME }}:${{ env.BETA_VERSION }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.LATEST_VERSION }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  update-docker-hub-description:
    name: Update Docker Hub Description
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md
          short-description: "Brave Search MCP Server - Multi-Architecture Docker Image"
