name: Docker Build & Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_profile:
        description: 'Build profile'
        required: false
        default: 'production'
        type: choice
        options:
          - development
          - production
          - ci
      version:
        description: 'Version to build (e.g., 2.0.61). Leave empty to use default.'
        required: false
        type: string
      publish_latest:
        description: 'Publish as latest tag'
        required: false
        type: string
        default: 'false'
      publish_stable:
        description: 'Publish as stable tag'
        required: false
        type: string
        default: 'false'
      publish_beta:
        description: 'Publish as beta tag'
        required: false
        type: string
        default: 'false'
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
      build_profile:
        description: 'Build profile'
        required: false
        type: string
        default: 'production'
      publish_latest:
        description: 'Publish as latest tag'
        required: false
        type: string
        default: 'false'
      publish_stable:
        description: 'Publish as stable tag'
        required: false
        type: string
        default: 'false'

env:
  REPO_NAME: brave-search-mcp
  REGISTRY: docker.io
  IMAGE_NAME: mekayelanik/brave-search-mcp
  NPM_PACKAGE: '@brave/brave-search-mcp-server'
  # Build configuration
  BASE_IMAGE: node:alpine
  SUPERGATEWAY_REPO: supergateway
  SUPERGATEWAY_VERSION: latest

jobs:
  # Determine what version to build
  prepare:
    name: Prepare Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_new_version: ${{ steps.version.outputs.is_new_version }}
      publish_latest: ${{ steps.version.outputs.publish_latest }}
      publish_stable: ${{ steps.version.outputs.publish_stable }}
      publish_beta: ${{ steps.version.outputs.publish_beta }}
    steps:
      - name: Determine version to build
        id: version
        run: |
          # Check for version input (from workflow_dispatch or workflow_call)
          INPUT_VERSION="${{ inputs.version || github.event.inputs.version }}"
          PUBLISH_LATEST="${{ inputs.publish_latest || github.event.inputs.publish_latest || 'false' }}"
          PUBLISH_STABLE="${{ inputs.publish_stable || github.event.inputs.publish_stable || 'false' }}"
          PUBLISH_BETA="${{ inputs.publish_beta || github.event.inputs.publish_beta || 'false' }}"

          if [[ -n "$INPUT_VERSION" ]]; then
            # Use the provided version
            VERSION="$INPUT_VERSION"
            IS_NEW_VERSION="true"
            echo "Using provided version: $VERSION"
          else
            # Fetch latest version from npm registry
            echo "Fetching latest version from npm..."
            VERSION=$(curl -s "https://registry.npmjs.org/${{ env.NPM_PACKAGE }}" | jq -r '.["dist-tags"].latest')

            if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
              echo "Error: Could not fetch latest version from npm"
              exit 1
            fi

            IS_NEW_VERSION="false"
            echo "Using latest npm version: $VERSION"

            # For scheduled/push builds, auto-publish as latest and stable
            if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ github.event_name }}" == "push" ]]; then
              PUBLISH_LATEST="true"
              PUBLISH_STABLE="true"
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_new_version=$IS_NEW_VERSION" >> $GITHUB_OUTPUT
          echo "publish_latest=$PUBLISH_LATEST" >> $GITHUB_OUTPUT
          echo "publish_stable=$PUBLISH_STABLE" >> $GITHUB_OUTPUT
          echo "publish_beta=$PUBLISH_BETA" >> $GITHUB_OUTPUT

          echo "## Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish Latest | $PUBLISH_LATEST |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish Stable | $PUBLISH_STABLE |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish Beta | $PUBLISH_BETA |" >> $GITHUB_STEP_SUMMARY

  lint:
    name: Pre-build Validation
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: error

      - name: Validate shell script syntax
        run: |
          for script in DockerfileModifier.sh resources/*.sh; do
            if [[ -f "$script" ]]; then
              echo "Checking: $script"
              bash -n "$script"
            fi
          done

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [prepare, lint]
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build profile
        id: profile
        run: |
          PROFILE="${{ inputs.build_profile || github.event.inputs.build_profile || 'production' }}"

          case "$PROFILE" in
            "development"|"dev")
              echo "compression_type=gzip" >> $GITHUB_OUTPUT
              echo "compression_level=1" >> $GITHUB_OUTPUT
              ;;
            "production"|"prod")
              echo "compression_type=zstd" >> $GITHUB_OUTPUT
              echo "compression_level=22" >> $GITHUB_OUTPUT
              ;;
            "ci"|"continuous-integration")
              echo "compression_type=zstd" >> $GITHUB_OUTPUT
              echo "compression_level=2" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "compression_type=zstd" >> $GITHUB_OUTPUT
              echo "compression_level=15" >> $GITHUB_OUTPUT
              ;;
          esac

          echo "profile=$PROFILE" >> $GITHUB_OUTPUT

      - name: Prepare build data
        run: |
          mkdir -p build_data
          echo "${{ env.BASE_IMAGE }}" > build_data/base-image
          echo "${{ needs.prepare.outputs.version }}" > build_data/version
          echo "${{ env.SUPERGATEWAY_REPO }}" > build_data/supergateway_repo
          echo "${{ env.SUPERGATEWAY_VERSION }}" > build_data/supergateway_version
          touch build_data/npm_dependencies

      - name: Generate Dockerfile
        run: |
          chmod +x DockerfileModifier.sh
          ./DockerfileModifier.sh

      - name: Generate build timestamp
        run: |
          TZ='UTC' date +"This Image Was Built At: %Y-%m-%d %H:%M:%S %Z" > resources/build-timestamp.txt

      - name: Determine tags
        id: tags
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PUBLISH_LATEST="${{ needs.prepare.outputs.publish_latest }}"
          PUBLISH_STABLE="${{ needs.prepare.outputs.publish_stable }}"
          PUBLISH_BETA="${{ needs.prepare.outputs.publish_beta }}"
          DATE_TAG=$(date "+%d%m%Y%H%M")

          # Start with version tags
          TAGS="${{ env.IMAGE_NAME }}:${VERSION}"
          TAGS="${TAGS},${{ env.IMAGE_NAME }}:${VERSION}-${DATE_TAG}"

          # Add latest tag if requested
          if [[ "$PUBLISH_LATEST" == "true" && "${{ github.event_name }}" != "pull_request" ]]; then
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:latest"
          fi

          # Add stable tag if requested
          if [[ "$PUBLISH_STABLE" == "true" && "${{ github.event_name }}" != "pull_request" ]]; then
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:stable"
          fi

          # Add beta tag if requested
          if [[ "$PUBLISH_BETA" == "true" && "${{ github.event_name }}" != "pull_request" ]]; then
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:beta"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Tags to build: $TAGS"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ env.REPO_NAME }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ needs.prepare.outputs.version }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}:buildcache-{1},mode=max', env.IMAGE_NAME, needs.prepare.outputs.version) || '' }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          provenance: false
          sbom: false

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && needs.prepare.outputs.is_new_version == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body: |
            ## Brave Search MCP Server v${{ needs.prepare.outputs.version }}

            Automated build from NPM package `${{ env.NPM_PACKAGE }}@${{ needs.prepare.outputs.version }}`

            ### Docker Image

            ```bash
            docker pull ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}
            ```

            ### Quick Start

            ```bash
            docker run -d \
              --name=brave-search-mcp \
              -p 8040:8040 \
              -e BRAVE_API_KEY=your-api-key-here \
              ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}
            ```

            ### Supported Architectures

            - `linux/amd64` (Intel/AMD 64-bit)
            - `linux/arm64` (ARM 64-bit / Apple Silicon)
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, 'beta') || contains(needs.prepare.outputs.version, 'rc') || contains(needs.prepare.outputs.version, 'alpha') }}
          generate_release_notes: true

      - name: Cleanup build artifacts
        if: always()
        run: |
          rm -rf build_data
          rm -f Dockerfile.${{ env.REPO_NAME }}

      - name: Build Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags Published" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  update-docker-hub-description:
    name: Update Docker Hub Description
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md
          short-description: "Brave Search MCP Server - Multi-Architecture Docker Image"
